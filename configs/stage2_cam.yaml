seed: 42

model:
  clip_backbone: "ViT-B/16"
  clip_weights: "assets/ViT-B-16.pt"
  damp_ckpt: "checkpoints/stage1/hist_to_bcss"
  use_damp_features: true
  feature_layer: -2

prompts:
  template: "a clean origami {}."
  classes:
    tumor: ["tumor", "cancer", "neoplasm", "carcinoma"]
    stroma: ["stroma", "stromal tissue", "connective tissue"]
  background:
    - "background"
    - "tissue"
    - "slide"
  strategy:
    use_sharpness_selection: true
    use_synonym_fusion: true
    extra_templates:
      - "a clean origami {}."
    sharpness_eps: 1.0e-6

cam:
  use_softmax_gradcam: true
  replace_cls_with_avg: true

caa:
  enabled: true
  threshold: 0.4
  iterations: 2

refinement:
  mode: "caa" # caa | co_attention | hybrid
  co_attention:
    alpha: 0.6
    beta: 0.4
    blend: 0.5
    temperature: 0.07

crf:
  enabled: true
  iter: 10
  pos_w: 3
  pos_xy_std: 1
  bi_w: 4
  bi_xy_std: 67
  bi_rgb_std: 3

confidence:
  threshold: 0.95
  source: "cam" # cam | prob

runtime:
  allow_tf32: true
  cudnn_benchmark: true
  matmul_precision: "high"
  amp: true
  amp_dtype: "bf16"
  batch_size: 128
  io_workers: 32
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true

dataset:
  root: "data/CrossDomainSeg"
  target_domain: "BCSS"
  split: "train"

output:
  cam_dir: "outputs/stage2/cams/hist_to_bcss"
  pseudomask_dir: "outputs/stage2/pseudomasks/hist_to_bcss"
  skip_existing: true
