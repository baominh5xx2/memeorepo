seed: 42

dataset:
  root: "data/CrossDomainSeg"
  domain: "BCSS"
  train_split: "train"
  val_split: "val"
  test_split: "test"
  pseudo_mask_dir: "outputs/stage2/pseudomasks/hist_to_bcss"

model:
  architecture: "deeplabv3_resnet101"
  pretrained_backbone: true
  num_classes: 3

optimizer:
  name: "adamw"
  lr: 6.0e-5
  weight_decay: 1.0e-4

training:
  epochs: 25
  batch_size: 8
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  image_size: 512
  save_dir: "checkpoints/stage3/hist_to_bcss"
  eval_every: 1
  early_stop_patience: 4
  early_stop_min_delta: 0.002
  consistency:
    enabled: false
    weight: 0.00
    confidence_threshold: 0.60
    noise_std: 0.05
    drop_prob: 0.50
    cutout_ratio: 0.20
  augmentation:
    random_flip: true
    random_crop: true
    color_jitter: true

runtime:
  allow_tf32: true
  cudnn_benchmark: true
  matmul_precision: "high"
  amp: true
  amp_dtype: "bf16"
  channels_last: true

cgl:
  enabled: true
  confidence_threshold: 0.35
  ignore_index: 255
