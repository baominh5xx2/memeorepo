seed: 42

dataset:
  root: "data/CrossDomainSeg"
  domain: "BCSS"
  train_split: "train"
  val_split: "val"
  test_split: "test"
  pseudo_mask_dir: "outputs/stage2/pseudomasks/hist_to_bcss"

model:
  architecture: "deeplabv3_resnet101"
  pretrained_backbone: true
  num_classes: 3

optimizer:
  name: "adamw"
  lr: 6.0e-5
  weight_decay: 1.0e-4

training:
  epochs: 40
  batch_size: 16
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  image_size: 512
  save_dir: "checkpoints/stage3/hist_to_bcss"
  eval_every: 1

runtime:
  allow_tf32: true
  cudnn_benchmark: true
  matmul_precision: "high"
  amp: true
  amp_dtype: "bf16"
  channels_last: true

cgl:
  enabled: true
  confidence_threshold: 0.40
  ignore_index: 255
